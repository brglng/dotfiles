# Set TERM environment variable
set -g default-terminal xterm-256color
if-shell '[ "$TERM" = "wezterm" ] && infocmp wezterm' 'set -g default-terminal wezterm'
if-shell '[ "$TERM" = "xterm-kitty" ] && infocmp xterm-kitty' 'set -g default-terminal xterm-kitty'

#### Plugins

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'robhurring/tmux-uptime'
set -g @plugin 'minhdanh/tmux-network-speed'
run '~/.tmux/plugins/tpm/bin/install_plugins'

# tmux messages are displayed for 4 seconds
set -g display-time 4000

set -g history-limit 100000

if-shell '[ -x /bin/zsh ]' 'set-option -g default-command /bin/zsh'
if-shell '[ -x /usr/bin/zsh ]' 'set-option -g default-command /usr/bin/zsh'
if-shell '[ -x /usr/bin/local/zsh ]' 'set-option -g default-command /usr/bin/local/zsh'
if-shell '[ -x /usr/local/bin/nu ]' 'set-option -g default-command /usr/local/bin/nu'
if-shell '[ -x /opt/homebrew/bin/nu ]' 'set-option -g default-command /opt/homebrew/bin/nu'
if-shell '[ -x ~/.pixi/bin/nu ]' 'set-option -g default-command ~/.pixi/bin/nu'
if-shell '[ -x ~/.local/bin/zsh ]' 'set-option -g default-command ~/.local/bin/zsh'
if-shell '[ -x ~/.local/bin/nu ]' 'set-option -g default-command ~/.local/bin/nu'
# if-shell '[ "$(uname -s)" = "Darwin" ]' "set-option -g default-command 'reattach-to-user-namespace -l zsh -l'"

set -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
# bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

set -g set-titles on

set -g automatic-rename on
set -g automatic-rename-format '#{?#{==·#{pane_current_path},$HOME},~,#{b:pane_current_path}}·#{pane_current_command}'

set -g @cpu_percentage_format "%2.0f%%"
set -g @ram_percentage_format "%2.0f%%"
set -g @gpu_percentage_format "%2.0f%%"
set -g @network_speed_format '%.1f'

# rose pine dawn
set -g @status_bg '#c8c3bd'
set -g @status_current_fg '#575279'
set -g @status_current_bg '#faf4ed'
set -g @status_inactive_fg '#797593'
set -g @status_inactive_bg '#dcd6d0'
set -g @status_a_bg '#dcd6d0'
set -g @status_prefix_fg '#faf4ed'
set -g @status_prefix_bg '#56949f'
set -g @status_x_fg '#464261'
set -g @status_x_bg '#fffaf3'
set -g @status_y_fg '#d7827e'
set -g @status_y_bg '#f2e9e1'
set -g @status_z_fg '#faf4ed'
set -g @status_z_bg '#d7827e'

set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#{@status_bg},fg=#{@status_inactive_fg}'
set -g status-left '#{?client_prefix,#[bg=#{@status_prefix_bg}]#[fg=#{@status_prefix_fg}],#[bg=#{@status_inactive_bg}]#[fg=#{@status_fg}]} #S #[fg=#{@status_bg}]#{?client_prefix,#[bg=#{@status_prefix_bg}],#[bg=#{@status_inactive_bg}]}#[default]'
set -g window-status-format '#[fg=#{@status_inactive_bg}]#[bg=#{@status_bg}]#[fg=#{@status_inactive_fg}]#[bg=#{@status_inactive_bg}] #{window_index} #{?#{==:#{pane_current_path},$HOME},~,#{b:pane_current_path}}#[dim] #{pane_current_command} #[nodim]#[bg=#{@status_inactive_bg}]#[fg=#{@status_bg}]#[default]'
set -g window-status-current-format '#[fg=#{@status_current_bg}]#[bg=#{@status_bg}]#[fg=#{@status_current_fg}]#[bg=#{@status_current_bg}]#[bold] #{window_index} #{?#{==:#{pane_current_path},$HOME},~,#{b:pane_current_path}}#[nobold] #{pane_current_command} #[bg=#{@status_current_bg}]#[fg=#{@status_bg}]#[default]'
set -g window-status-separator ''
set -g status-right '#[fg=#{@status_bg}]#[bg=#{@status_x_bg}]#[fg=#{@status_x_fg}]#[bg=#{@status_x_bg}] #{network_speed}  #{cpu_fg_color}#{cpu_icon} #{cpu_percentage}#{?#{!=,#{cpu_temp},}, #{cpu_temp_fg_color}#{cpu_temp}} #{ram_fg_color}#{ram_icon} #{ram_percentage}#{?#{!=,#{gpu_percentage},No GPU}, #{gpu_fg_color}#{gpu_icon} #{gpu_percentage} #{gpu_temp_fg_color}#{gpu_temp}} #[fg=#{@status_x_bg}]#[bg=#{@status_y_bg}]#[fg=#{@status_y_fg}]#[bg=#{@status_y_bg}] #h  #{uptime} #[fg=#{@status_y_bg}]#[bg=#{@status_z_bg}]#[fg=#{@status_z_fg}]#[bg=#{@status_z_bg}]#[bold] %m/%d %a %H:%M #[default]'
set -g status-right-length 100

set -g monitor-activity on
# set -g visual-activity off
# set -g bell-action none
set -g visual-bell off
set -g window-status-activity-style none

# required for image support
set -g allow-passthrough on

# set first window to index 1 (not 0) to map more to the keyboard layout
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

set -g xterm-keys on
set -g prefix C-a
bind-key C-a send-prefix

####

# new window at current directory
bind-key s split-window -c "#{pane_current_path}"
bind-key ^s split-window -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"
bind-key ^v split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"
bind-key ^c new-window -c "#{pane_current_path}"
bind-key r source-file ~/.tmux.conf

# set -g pane-border-status top
set -g pane-border-format " #{pane_index} #[bold]#{pane_current_command} #[nobold]#{s|$HOME|~:pane_current_path}#[none] "
set-hook -g 'after-new-window'   'run-shell -b "if [ \#{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g 'after-kill-pane'    'run-shell -b "if [ \#{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g 'pane-exited'        'run-shell -b "if [ \#{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g 'after-split-window' 'run-shell -b "if [ \#{window_panes} -gt 1 ]; then tmux set pane-border-status top; fi"'
set-hook -g 'after-resize-pane'  "if-shell -F '#{||:#{==:#{window_panes},1},#{window_zoomed_flag}}' 'set -g pane-border-status off' 'set -g pane-border-status bottom'"

#### MOUSE

set -g mouse on

# Drag to re-order windows
bind-key -n MouseDrag1Status swap-window -d -t=

# Double click on the window list to open a new window
bind-key -n DoubleClick1Status new-window

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
