# font_family      Maple Mono NF CN
# font_family      LXGW Bright Code TC NF
# font_family LXGW Bright TC Monaspace Argon NF
font_family Monaspace Xenon Noto Serif LXGW CJK TC NF
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 16.0

font_features MonaspaceXenonNotoSerifLXGWCJKTCNF-Regular +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +liga
font_features MonaspaceXenonNotoSerifLXGWCJKTCNF-Italic +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +liga
font_features MonaspaceXenonNotoSerifLXGWCJKTCNF-Light +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +liga
font_features MonaspaceXenonNotoSerifLXGWCJKTCNF-LightItalic +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +liga
font_features MonaspaceXenonNotoSerifLXGWCJKTCNF-Medium +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +liga
font_features MonaspaceXenonNotoSerifLXGWCJKTCNF-MediumItalic +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09 +ss10 +liga

cursor_shape beam
cursor_blink_interval 0
# cursor_trail 1

scrollbar hovered
scrollbar_width 1.0

url_style straight

window_border_width 0pt
placement_strategy top
hide_window_decorations titlebar-only

tab_bar_style powerline
tab_powerline_style round
active_tab_font_style bold

notify_on_cmd_finish unfocused

macos_option_as_alt yes
macos_show_window_title_in window
macos_quit_when_last_window_closed yes
