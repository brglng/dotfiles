maximized = true
tabs = false
frame = "buttonless"
title-hidden = true
# no-multigrid = true
# wsl = true
# neovim-bin = "/home/brglng/.pixi/bin/nvim"

[font]
normal = [
    "Monaspace Xenon Noto Serif LXGW CJK TC NF"
    # "LXGW Bright TC Monaspace Argon NF"
    # "Maple Mono NF CN",
    # "Flog Symbols",
]
hinting = "none"
size = 16.0
# width = 0.4

[font.features]
"Monaspace Xenon Noto Serif LXGW CJK TC NF" = [ "+calt", "+ss01", "+ss02", "+ss03", "+ss04", "+ss05", "+ss06", "+ss07", "+ss08", "+ss09", "+ss10", "+liga" ]
"LXGW Bright TC Monaspace Argon NF" = [ "+calt", "+ss01", "+ss02", "+ss03", "+ss04", "+ss05", "+ss06", "+ss07", "+ss08", "+ss09", "+ss10", "+liga" ]

[box-drawing]
mode = "native"
